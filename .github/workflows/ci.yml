name: Local Development Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - name: EXPRESS
            path: EXPRESS
            test_command: npm test
          - name: REACT
            path: REACT
            test_command: npm test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app.path }}/package-lock.json

      - name: Install dependencies for ${{ matrix.app.name }}
        run: npm ci
        working-directory: ${{ matrix.app.path }}

      - name: Run tests for ${{ matrix.app.name }}
        run: ${{ matrix.app.test_command }}
        working-directory: ${{ matrix.app.path }}

  local-docker-build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Build Express Container
        run: docker build -t express-app ./EXPRESS

      - name: Build React Container
        run: docker build -t react-app ./REACT

      - name: Run Docker Compose
        run: docker compose -f compose.yml config

      - name: Merge master into production
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin

          git checkout production
          git merge origin/master --no-edit
          git push origin production
